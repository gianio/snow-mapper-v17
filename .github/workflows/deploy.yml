name: Build and deploy snow model

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"     # 05:00 CEST
    - cron: "0 9 * * *"     # 11:00 CEST
    - cron: "27 13 * * *"   # 15:27 CEST
    - cron: "0 16 * * *"    # 18:00 CEST
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgdal-dev libproj-dev gdal-bin

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate static site
        run: |
          python run_interactive.py
          mkdir -p dist
          cp outputs/interactive_today.html dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
